name: Version Sync
description: Allows downstream clones to synchronize with the latest version of the EZ EDGE CMS core.

on:
  workflow_dispatch:
    inputs:
      upstream_branch:
        description: "Branch to sync from"
        required: true
        default: "main"

jobs:
  sync:
    name: Sync with Main CMS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SYNC_TOKEN || github.token }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

      - name: Add Upstream Remote
        run: |
          git remote add upstream https://github.com/Evgenii-Zinner/ez-edge-cms.git
          git fetch upstream ${{ github.event.inputs.upstream_branch }}

      - name: Merge Upstream Changes
        run: |
          # We use --allow-unrelated-histories to handle standalone clones.
          # We use -X theirs to automatically resolve conflicts by favoring the main CMS core.
          git merge upstream/${{ github.event.inputs.upstream_branch }} --allow-unrelated-histories -X theirs -m "chore: sync latest version from main cms"

      - name: Push Updates
        run: |
          git push origin ${{ github.ref_name }}
